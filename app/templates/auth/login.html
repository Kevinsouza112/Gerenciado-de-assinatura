{% extends "base.html" %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-xl-5">
      <div class="app-panel p-4 p-lg-5">
        <div class="text-center mb-4">
          <span class="summary-icon summary-icon-primary mx-auto mb-3"><i class="bi bi-shield-lock" aria-hidden="true"></i></span>
          <div class="page-kicker mb-2">Acesso</div>
          <h1 class="h2 fw-bold mb-2">Entrar na conta</h1>
          <p class="text-secondary mb-0">Use seu e-mail e senha para ver suas assinaturas.</p>
        </div>

        <form method="post" novalidate>
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label class="form-label" for="email">E-mail</label>
            <input class="form-control {% if errors.email %}is-invalid{% endif %}" id="email" name="email" type="email" inputmode="email" autocomplete="email" maxlength="254" required value="{{ form_data.get('email', '') }}">
            {% if errors.email %}<div class="invalid-feedback">{{ errors.email }}</div>{% endif %}
          </div>

          <div class="mb-4">
            <label class="form-label" for="senha">Senha</label>
            <input class="form-control {% if errors.senha %}is-invalid{% endif %}" id="senha" name="senha" type="password" autocomplete="current-password" required>
            {% if errors.senha %}<div class="invalid-feedback">{{ errors.senha }}</div>{% endif %}
          </div>

          <button class="btn btn-primary btn-icon w-100" type="submit">
            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
            Entrar
          </button>
        </form>

        <div class="text-center text-secondary mt-4">
          Ainda não tem conta?
          <a class="fw-bold" href="{{ url_for('auth.register') }}">Criar cadastro</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
