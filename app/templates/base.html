<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Gerenciador de Assinaturas" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
      :root {
        --app-border: #e7eaf0;
        --app-muted: #667085;
        --app-surface: #ffffff;
        --app-bg: #f6f8fb;
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(13, 110, 253, 0.08), transparent 28rem),
          var(--app-bg);
        color: #1d2733;
      }

      .app-navbar {
        backdrop-filter: blur(10px);
        background: rgba(255, 255, 255, 0.92);
      }

      .brand-mark,
      .summary-icon {
        align-items: center;
        display: inline-flex;
        justify-content: center;
      }

      .brand-mark {
        background: #0d6efd;
        border-radius: 8px;
        color: #ffffff;
        height: 2rem;
        width: 2rem;
      }

      .summary-card,
      .app-panel {
        background: var(--app-surface);
        border: 1px solid var(--app-border);
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(31, 41, 55, 0.06);
      }

      .summary-icon {
        border-radius: 8px;
        height: 2.5rem;
        width: 2.5rem;
      }

      .summary-icon-primary {
        background: #e7f1ff;
        color: #0d6efd;
      }

      .summary-icon-success {
        background: #eaf7ef;
        color: #198754;
      }

      .summary-icon-warning {
        background: #fff4df;
        color: #b58100;
      }

      .summary-icon-info {
        background: #e8f6fb;
        color: #0aa2c0;
      }

      .table > :not(caption) > * > * {
        padding-bottom: 1rem;
        padding-top: 1rem;
      }

      .btn-icon {
        align-items: center;
        display: inline-flex;
        gap: 0.4rem;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg app-navbar border-bottom sticky-top">
      <div class="container py-2">
        <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="{{ url_for('subscriptions.index') }}">
          <span class="brand-mark"><i class="bi bi-wallet2" aria-hidden="true"></i></span>
          <span>Assinaturas</span>
        </a>
        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-secondary btn-icon" href="{{ url_for('subscriptions.index') }}">
            <i class="bi bi-grid-1x2" aria-hidden="true"></i>
            <span class="d-none d-sm-inline">Painel</span>
          </a>
          <a class="btn btn-primary btn-icon" href="{{ url_for('subscriptions.create_subscription') }}">
            <i class="bi bi-plus-lg" aria-hidden="true"></i>
            <span>Nova</span>
          </a>
        </div>
      </div>
    </nav>

    <main class="container py-4 py-lg-5">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
